<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式代辦事項 To-Do List</title>
    <link rel="stylesheet" href="0613.css">
</head>
<body>

    <div class="todo-container">
        <h1>我的代辦事項</h1>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="請輸入提醒事項...">
            <input type="datetime-local" id="todo-time">
            <button id="add-btn">確定新增</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script src="0613.js"></script>
</body>
</html>
